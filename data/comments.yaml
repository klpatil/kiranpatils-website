  parent_id: "0"
  content: '[&#8230;] Application Pool Recycle/Crash &#8212; If your application pool is crashing is or recycling [How Can I check that? You can check EventLog OR if your application got log do log entry [Just a note : Application_End will not get called, when your application crashed unexpectedly a.k.a. Crash] &#8212; see &#8212; http://weblogs.asp.net/scottgu/archive/2005/12/14/433194.aspx] periodically than it&#8217;s not good for your application&#8217;s health. Because when application pool gets recycled everything in memory [Session/Cache/Static/Application objects] gets lost, and your application need to server everything from Database and rebuild cache. You can solve this issue by checking EventLog and Configuring+Analyzing Crash Dump.http://kiranpatils.wordpress.com/2012/06/20/is-it-necessary-to-recycle-worker-process-periodically/ and http://kiranpatils.wordpress.com/2010/05/25/goo-to-know-on-asp-net-application-restarts/ [&#8230;]'
