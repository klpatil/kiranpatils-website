  content: One thing I ran into is WebDeploy (as of v3.6) stops working if TLS 1.0 is disabled. So if you've disabled TLS 1.0 and earlier for PCI compliance or as a best practice then you will hit this. By using http:// you are not using SSL/TLS which would bypass any TLS issues, and I believe that you end up using the older MSDEPLOYAGENTSERVICE service instead of msdeploy.axd as well.
